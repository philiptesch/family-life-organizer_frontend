<section>
<main>
    <div>
        <h1> Willkommen zurück !</h1>
        <h6> Schön, das du wieder da bist</h6>


    </div>


    <div class="login-Area-Access">

        <div>
        
            <form class="example-form">
            <div class="email-Area">
            <label class="form-label" for="name">Email-Adresse:</label>
           <div class="email-field">  
              <mat-icon class="custom-icon">mail
    </mat-icon>
            <input type="email"
           placeholder="Ex. pat@example.com">
            </div>
            </div>


            <div class="password-Area">
            <label class="form-label" for="name">Password:</label>
            <div class="password-field">
            <mat-icon class="custom-icon-password">lock
    </mat-icon>   
            <input   [type]="checkPasswordVisible ? 'text' : 'password'"  placeholder="Password">

        @if (checkPasswordVisible) {
                <mat-icon class="password-icon" (click)="showPassword()"> visibility
                </mat-icon>}@else {
                <mat-icon class="password-icon" (click)="showPassword()"> visibility_off
                </mat-icon>
    }
                </div>
              </div>


              <div class="user-remain-registred-Area" >

                <div class="user-remain-registred">
                <label class="container">
                <input type="checkbox" checked="checked">
                <div class="checkmark"></div>
                </label>
                <span> Angemeldet bleiben</span>
                </div>

                <span class="forgot-password"> Passwort vergessen ?</span>

              </div>

              <div class="button-Section">

              <button> Anmelden</button>
              
        </div>
</form>


       <div class="auth-divider">
    <hr>
    <span>oder weiter mit</span>
    <hr>
    </div>



    <div class="google-login">
        <button></button>
    </div>


        </div>




    </div>

</main>
</section>
