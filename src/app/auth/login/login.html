<main class="bg-page">
  <header>
    <app-logo [isChildActive]="isChildLoginActive"></app-logo>



  </header>

 

  <div  class="login-wrapper">

  <div class="parent_bg" [class.hidden]="isChildLoginActive"></div>

  <div class="child_bg" [class.visible]="isChildLoginActive"></div>

    <section class="headline">

      <div class="header-togglebar">
      


         <label class="switch">
        <input (change)="toggleMode()" type="checkbox">

        <span class="slider">

          <mat-icon class="icon family">
            family_restroom
          </mat-icon>

          <mat-icon class="icon child">
            child_care
          </mat-icon>

        </span>
      </label>
      </div>

      <div class="child-info-content">
        <div class="speech-bubble-content">
        <img src="\assets\img\childs.png" alt="">
         <div class="speech-bubble">
    Hier kannst du auswählen, ob du dich als Kind oder als Elternteil anmeldest.
    </div>
      </div>
         </div>


      <div class="login-part">

      @if(!isChildLoginActive) {
      <app-partent-login ></app-partent-login>
      }@else{
      <app-child-login></app-child-login>
      }
        </div>  
     </section>

  </div>

</main>
