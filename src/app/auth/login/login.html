<main class="bg-page">
  <header>
    <app-logo></app-logo>
  </header>

  <div  class="login-wrapper">
  <div class="parent_bg" [class.hidden]="isChildLoginActive"></div>

  <div class="child_bg" [class.visible]="isChildLoginActive"></div>

    <section class="headline">
      
         <label class="switch">
        <input (change)="toggleMode()" type="checkbox">

        <span class="slider">

          <mat-icon class="icon family">
            family_restroom
          </mat-icon>

          <mat-icon class="icon child">
            child_care
          </mat-icon>

        </span>
      </label>
      
      <app-partent-login></app-partent-login>

      <app-child-login></app-child-login>

 

    </section>

  </div>
</main>
