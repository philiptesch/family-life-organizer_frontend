<main class="bg-page">
  <header>
    <app-logo></app-logo>
  </header>

  <div [ngClass]="{'child_bg_Animation': isChildLoginActive && hasIntroFinished , 'startAnimationBackground':
    isIntroActive , 
    'parent_bg_Animation': hasIntroFinished && !isChildLoginActive  }" class="login-wrapper">

    <section class="headline">
      
         <label class="switch">
        <input (change)="toggleMode()" type="checkbox">

        <span class="slider">

          <mat-icon class="icon family">
            family_restroom
          </mat-icon>

          <mat-icon class="icon child">
            child_care
          </mat-icon>

        </span>
      </label>
      
      <app-partent-login></app-partent-login>

      <app-child-login></app-child-login>

 

    </section>

  </div>
</main>
